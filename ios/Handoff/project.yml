name: Handoff
options:
  bundleIdPrefix: dev.omriariav.handoff
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"
  swift-nio-ssh:
    url: https://github.com/apple/swift-nio-ssh
    from: "0.8.0"

targets:
  Handoff:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - Resources
    dependencies:
      - package: SwiftTerm
      - package: swift-nio-ssh
        product: NIOSSH
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
        DEVELOPMENT_TEAM: W6SR2D4HWY
        CODE_SIGN_STYLE: Automatic
