name: Handoff
options:
  bundleIdPrefix: ${BUNDLE_ID_PREFIX}
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

# Each developer sets their own BUNDLE_ID_PREFIX and DEVELOPMENT_TEAM via
# environment variables or a local.yml file, so the repo stays team-agnostic.
# See ios/README.md for setup.

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"
  swift-nio-ssh:
    url: https://github.com/apple/swift-nio-ssh
    from: "0.8.0"

targets:
  Handoff:
    type: application
    platform: iOS
    sources:
      - Sources
      - Resources/Assets.xcassets
    resources:
      - path: Resources
        excludes:
          - Assets.xcassets
    dependencies:
      - package: SwiftTerm
      - package: swift-nio-ssh
        product: NIOSSH
      - framework: Frameworks/TailscaleKit.xcframework
        embed: true
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
        DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
        CODE_SIGN_STYLE: Automatic
